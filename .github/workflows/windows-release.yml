name: Windows NSIS release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows NSIS installer
        run: npm run bundle:nsis

      - name: Locate NSIS artifact
        id: artifact
        run: |
          $setup = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) {
            throw "NSIS setup.exe not found under src-tauri/target/release/bundle/nsis"
          }
          $hash = (Get-FileHash -Algorithm SHA256 $setup.FullName).Hash.ToLower()
          "path=$($setup.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$($setup.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Built $($setup.Name) sha256=$hash"

      - name: Write SHA256 sidecar
        run: |
          $name = "${{ steps.artifact.outputs.name }}"
          $sha = "${{ steps.artifact.outputs.sha256 }}"
          "$sha  $name" | Out-File -FilePath "$name.sha256" -Encoding ascii
          Write-Host (Get-Content "$name.sha256")

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-spur-windows-nsis
          path: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.name }}.sha256
          if-no-files-found: error

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.name }}.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
